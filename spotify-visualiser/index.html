      /* Ensure navbar stays on top of 3D canvas with proper z-index - matches gallery styling */
      body nav.navbar {
        position: fixed !important;
        top: 0.5rem !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        z-index: 5000 !important;
        pointer-events: auto !important;
        max-width: 340px; /* Normal state: slightly wider */
        width: fit-content;
        padding: 0.5rem 0.9rem;
        margin: 1rem auto 1rem;
        transition: max-width 0.2s ease, width 0.2s ease;
      }
      
      /* Increase size when expanded (options shown) */
      body nav.navbar.navbar-expanded {
        max-width: 480px; /* Expanded state: wider to fit all links */
        width: fit-content;
      }
      
      /* Ensure navbar elements are clickable */
      nav.navbar * {
        pointer-events: auto !important;
      }
      
      /* Add padding to body to prevent content overlap */
      body {
        padding-top: 5rem;
      }
    </style>

    <div id="app" class="h-dvh"></div>
    <canvas id="webgl"></canvas>
    <!-- Music Player Overlay -->
    <div id="music-player-overlay" class="music-player-overlay"></div>

    <div class="yoda-favicon" id="yodaResumeBtn" style="cursor:pointer;" aria-label="Open resume modal">
      <div class="yoda-modern-box"> Career Profile!</div>
      <img src="../../icons8-baby-yoda-color-favicons/web/icons8-baby-yoda-color-48.png" alt="Baby Yoda favicon" loading="lazy" />
    </div>
    <div id="resumeModal" class="resume-modal-overlay" style="display:none;">
      <button id="popOutBtn" class="pop-out-btn" aria-label="Open PDF in new window" title="Open in new window">🢅</button>
      <div class="resume-modal-inner">
        <iframe
          id="resumeViewerFrame"
          class="resume-pdf-frame"
          title="Resume PDF viewer"
          loading="lazy"
          frameborder="0"
          style="border: none; outline: none;"

    <!-- Spotify Web Playback SDK -->

    <!-- Page transitions and navbar script -->
    <link rel="stylesheet" href="../../assets/styles/galaxy.css">
    <script src="../../assets/scripts/page-transitions.js" defer></script>
    <script src="../../assets/scripts/resume-modal.js" defer></script>
    <script src="../Menu-new/script.js" defer></script>
    <style>
    .resume-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(5,5,10,0.92);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
    }
    .resume-modal-overlay::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.7;
      animation: twinkling 100s linear infinite;
    }
    @keyframes twinkling {
      from { background-position: 0 0; }
      to   { background-position: -1000px 1000px; }
    }
    .resume-modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .resume-modal-overlay.show .resume-modal-inner {
      animation: modalSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .resume-modal-inner {
      width: 98vw;
      max-width: 960px;
      height: 85vh;
      border-radius: 32px;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 8px 24px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.99);
      backdrop-filter: blur(24px) saturate(1.15);
      -webkit-backdrop-filter: blur(24px) saturate(1.15);
      border: none;
      outline: none;
      margin: 0;
      padding: 0;
      position: relative;
      z-index: 1;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .resume-pdf-frame {
      width: 100%;
      height: calc(100% + 2px);
      margin-bottom: -2px;
      border: none;
      outline: none;
      display: block;
      background: #ffffff;
      position: relative;
      z-index: 2;
    }
    .pop-out-btn {
      position: absolute;
      top: calc(50% - 42.5vh - 1.5rem);
      right: calc(50% - 480px - 2.5rem);
      z-index: 2001;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      border-radius: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.9);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: none;
      font-size: 1.5rem;
      line-height: 1;
    }
    @media (max-width: 960px) {
      .pop-out-btn {
        right: 1rem;
      }
    }
    .pop-out-btn:hover {
      background: transparent;
      color: rgba(255, 255, 255, 1);
      transform: scale(1.05);
      box-shadow: none;
    }
    .pop-out-btn:active {
      transform: scale(0.95);
    }
    </style>
  </body>
</html>
